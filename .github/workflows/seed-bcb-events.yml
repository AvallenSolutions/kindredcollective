name: Seed BCB London 2026 events

# Manually triggered from the GitHub Actions UI ("Run workflow" button).
# Inserts/updates the 26 BCB London fringe events from
# scripts/seed-bcb-events.ts. Idempotent — re-run as the source sheet evolves.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   NEXT_PUBLIC_SUPABASE_URL
#   SUPABASE_SERVICE_ROLE_KEY

on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run seed script
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/seed-bcb-events.ts
